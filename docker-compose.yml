# Kairos Intelligence v2.7.1 - Hostinger VPS + Traefik

services:
  evolution-go:
    image: atendai/evolution-api:latest
    container_name: kairos-evolution
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.kairos-evolution.rule=Host(`evolution.${TRAEFIK_HOST}`)
      - traefik.http.routers.kairos-evolution.entrypoints=websecure
      - traefik.http.routers.kairos-evolution.tls.certresolver=letsencrypt
      - traefik.http.services.kairos-evolution.loadbalancer.server.port=8080
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@kairos-postgres:5432/${POSTGRES_DB}
      - S3_ENABLED=true
      - S3_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - S3_SECRET_KEY=${MINIO_SECRET_KEY}
      - S3_ENDPOINT=kairos-minio
      - S3_PORT=9000
      - S3_USE_SSL=false
      - S3_BUCKET=${MINIO_BUCKET}
    volumes:
      - evolution_data:/evolution/instances
    networks:
      - kairos-net
    depends_on:
      - postgres
      - redis
      - minio

  openclaw:
    image: ghcr.io/hostinger/hvps-openclaw:latest
    container_name: kairos-openclaw
    init: true
    restart: unless-stopped
    ports:
      - "${OPENCLAW_PORT}:${OPENCLAW_PORT}"
    labels:
      - traefik.enable=true
      - traefik.http.routers.kairos-openclaw.rule=Host(`kairos.${TRAEFIK_HOST}`)
      - traefik.http.routers.kairos-openclaw.entrypoints=websecure
      - traefik.http.routers.kairos-openclaw.tls.certresolver=letsencrypt
      - traefik.http.services.kairos-openclaw.loadbalancer.server.port=${OPENCLAW_PORT}
    environment:
      - PORT=${OPENCLAW_PORT}
      - OPENCLAW_CONFIG_PATH=/data/openclaw.json
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - REDIS_URL=redis://kairos-redis:6379
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ADEMED_URL=${ADEMED_URL}
      - ADEMED_USER=${ADEMED_USER}
      - ADEMED_PASS=${ADEMED_PASS}
      - NEO4J_URI=bolt://kairos-neo4j:7687
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - CHROMA_HOST=kairos-chromadb
      - CHROMA_PORT=8000
      - CHROMA_AUTH_TOKEN=${CHROMA_AUTH_TOKEN}
      - PAPERCLIP_URL=http://kairos-paperclip:3000
      - EVOLUTION_API_URL=http://kairos-evolution:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
    volumes:
      - ./openclaw.json:/data/openclaw.json
      - ./agents:/data/agents
      - ./shared:/data/shared
      - ./graphrag:/data/graphrag
      - openclaw_data:/data
    networks:
      - kairos-net
    depends_on:
      - redis
      - neo4j
      - chromadb
      - paperclip

  paperclip:
    build:
      context: ./paperclip
      dockerfile: Dockerfile
    container_name: kairos-paperclip
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.kairos-paperclip.rule=Host(`paperclip.${TRAEFIK_HOST}`)
      - traefik.http.routers.kairos-paperclip.entrypoints=websecure
      - traefik.http.routers.kairos-paperclip.tls.certresolver=letsencrypt
      - traefik.http.services.kairos-paperclip.loadbalancer.server.port=3000
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@kairos-postgres:5432/paperclip
    networks:
      - kairos-net
    depends_on:
      - postgres

  redis:
    image: redis:7-alpine
    container_name: kairos-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - kairos-net

  postgres:
    image: postgres:16-alpine
    container_name: kairos-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-paperclip-db.sh:/docker-entrypoint-initdb.d/init-paperclip-db.sh:ro
    networks:
      - kairos-net

  neo4j:
    image: neo4j:5-community
    container_name: kairos-neo4j
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.kairos-neo4j.rule=Host(`neo4j.${TRAEFIK_HOST}`)
      - traefik.http.routers.kairos-neo4j.entrypoints=websecure
      - traefik.http.routers.kairos-neo4j.tls.certresolver=letsencrypt
      - traefik.http.services.kairos-neo4j.loadbalancer.server.port=7474
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    networks:
      - kairos-net

  chromadb:
    image: chromadb/chroma:latest
    container_name: kairos-chromadb
    restart: unless-stopped
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
      - CHROMA_SERVER_AUTHN_PROVIDER=chromadb.auth.token_authn.TokenAuthenticationServerProvider
      - CHROMA_SERVER_AUTHN_CREDENTIALS=${CHROMA_AUTH_TOKEN}
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - kairos-net

  minio:
    image: minio/minio:latest
    container_name: kairos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - kairos-net

  chromium:
    build:
      context: ./chromium
      dockerfile: Dockerfile
    container_name: kairos-chromium
    restart: unless-stopped
    environment:
      - ADEMED_URL=${ADEMED_URL}
      - ADEMED_USER=${ADEMED_USER}
      - ADEMED_PASS=${ADEMED_PASS}
    volumes:
      - ./agents/manager/skills:/app/skills:ro
    networks:
      - kairos-net
    shm_size: "2gb"

volumes:
  evolution_data:
  openclaw_data:
  redis_data:
  postgres_data:
  minio_data:
  neo4j_data:
  chroma_data:

networks:
  kairos-net:
    driver: bridge
    name: kairos-net

# =============================================================
# Kairós Intelligence v2.7 — Docker Compose
# =============================================================
# Rede: kairos-net (bridge)
# 8 serviços: Evolution Go, OpenClaw, Redis, PostgreSQL,
#             MinIO, Chromium (Playwright), Crawl4AI worker, Nginx
# =============================================================

services:
  # --- Gateway WhatsApp ---
  evolution-go:
    image: atendai/evolution-api:latest
    container_name: kairos-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - S3_ENABLED=true
      - S3_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - S3_SECRET_KEY=${MINIO_SECRET_KEY}
      - S3_ENDPOINT=${MINIO_ENDPOINT}
      - S3_BUCKET=${MINIO_BUCKET}
    volumes:
      - evolution_data:/evolution/instances
    networks:
      - kairos-net
    depends_on:
      - postgres
      - redis
      - minio

  # --- Orquestrador de Agentes ---
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: kairos-openclaw
    restart: unless-stopped
    ports:
      - "18789:18789"
    environment:
      - OPENCLAW_CONFIG_PATH=/home/openclaw/.openclaw/openclaw.json
      - OPENCLAW_GATEWAY_PASSWORD=${OPENCLAW_GATEWAY_PASSWORD}
    volumes:
      - ./openclaw.json:/home/openclaw/.openclaw/openclaw.json:ro
      - ./agents:/home/openclaw/agents:rw
      - openclaw_data:/home/openclaw/.openclaw
    networks:
      - kairos-net
    depends_on:
      - redis

  # --- Cache e Buffer de Mensagens ---
  redis:
    image: redis:7-alpine
    container_name: kairos-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - kairos-net

  # --- Banco de Dados (Governança) ---
  postgres:
    image: postgres:16-alpine
    container_name: kairos-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kairos-net

  # --- Armazenamento de Mídia ---
  minio:
    image: minio/minio:latest
    container_name: kairos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - kairos-net

  # --- Browser para Playwright (Escrita no Ademed) ---
  chromium:
    image: mcr.microsoft.com/playwright:v1.44.0-jammy
    container_name: kairos-chromium
    restart: unless-stopped
    command: >
      bash -c "
        pip install playwright crawl4ai &&
        playwright install chromium &&
        tail -f /dev/null
      "
    environment:
      - ADEMED_URL=${ADEMED_URL}
      - ADEMED_USER=${ADEMED_USER}
      - ADEMED_PASS=${ADEMED_PASS}
    volumes:
      - ./agents/manager/skills:/app/skills:ro
    networks:
      - kairos-net
    shm_size: "2gb"

  # --- Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: kairos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - kairos-net
    depends_on:
      - evolution-go
      - openclaw

volumes:
  evolution_data:
  openclaw_data:
  redis_data:
  postgres_data:
  minio_data:

networks:
  kairos-net:
    driver: bridge
    name: kairos-net

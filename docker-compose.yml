# =============================================================
# Kairós Intelligence v2.7.1 — Docker Compose
# =============================================================
# Rede: kairos-net (bridge)
# 10 serviços: Evolution Go, OpenClaw, Paperclip, Redis,
#              PostgreSQL, Neo4j, ChromaDB, MinIO,
#              Chromium (Playwright/Crawl4AI), Nginx
# =============================================================

services:
  # --- Gateway WhatsApp ---
  evolution-go:
    image: atendai/evolution-api:latest
    container_name: kairos-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - S3_ENABLED=true
      - S3_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - S3_SECRET_KEY=${MINIO_SECRET_KEY}
      - S3_ENDPOINT=${MINIO_ENDPOINT}
      - S3_BUCKET=${MINIO_BUCKET}
    volumes:
      - evolution_data:/evolution/instances
    networks:
      - kairos-net
    depends_on:
      - postgres
      - redis
      - minio

  # --- Orquestrador de Agentes ---
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: kairos-openclaw
    restart: unless-stopped
    ports:
      - "18789:18789"
    environment:
      - OPENCLAW_CONFIG_PATH=/home/openclaw/.openclaw/openclaw.json
      - OPENCLAW_GATEWAY_PASSWORD=${OPENCLAW_GATEWAY_PASSWORD}
      - REDIS_URL=${REDIS_URL}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ADEMED_URL=${ADEMED_URL}
      - ADEMED_USER=${ADEMED_USER}
      - ADEMED_PASS=${ADEMED_PASS}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_AUTH_TOKEN=${CHROMA_AUTH_TOKEN}
      - PAPERCLIP_URL=http://paperclip:3000
    volumes:
      - ./openclaw.json:/home/openclaw/.openclaw/openclaw.json:ro
      - ./agents:/home/openclaw/agents:rw
      - ./shared:/home/openclaw/shared:ro
      - ./graphrag:/home/openclaw/graphrag:ro
      - openclaw_data:/home/openclaw/.openclaw
    networks:
      - kairos-net
    depends_on:
      - redis
      - neo4j
      - chromadb
      - paperclip

  # --- Control Plane / Governança Multi-Tenant ---
  paperclip:
    image: paperclipai/paperclip:latest
    container_name: kairos-paperclip
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/paperclip
      - BETTER_AUTH_SECRET=${PAPERCLIP_AUTH_SECRET}
      - PAPERCLIP_PUBLIC_URL=${PAPERCLIP_PUBLIC_URL:-http://localhost:3000}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    networks:
      - kairos-net
    depends_on:
      - postgres

  # --- Cache e Buffer de Mensagens ---
  redis:
    image: redis:7-alpine
    container_name: kairos-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - kairos-net

  # --- Banco de Dados (Governança + Paperclip) ---
  postgres:
    image: postgres:16-alpine
    container_name: kairos-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-paperclip-db.sh:/docker-entrypoint-initdb.d/init-paperclip-db.sh:ro
    networks:
      - kairos-net

  # --- GraphRAG: Grafo de Conhecimento ---
  neo4j:
    image: neo4j:5-community
    container_name: kairos-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    networks:
      - kairos-net

  # --- GraphRAG: Vetores de Embedding ---
  chromadb:
    image: chromadb/chroma:latest
    container_name: kairos-chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
      - CHROMA_SERVER_AUTHN_PROVIDER=chromadb.auth.token_authn.TokenAuthenticationServerProvider
      - CHROMA_SERVER_AUTHN_CREDENTIALS=${CHROMA_AUTH_TOKEN}
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - kairos-net

  # --- Armazenamento de Mídia ---
  minio:
    image: minio/minio:latest
    container_name: kairos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - kairos-net

  # --- Browser para Playwright/Crawl4AI (Ademed) ---
  chromium:
    image: mcr.microsoft.com/playwright:v1.44.0-jammy
    container_name: kairos-chromium
    restart: unless-stopped
    command: >
      bash -c "
        pip install playwright crawl4ai &&
        playwright install chromium &&
        tail -f /dev/null
      "
    environment:
      - ADEMED_URL=${ADEMED_URL}
      - ADEMED_USER=${ADEMED_USER}
      - ADEMED_PASS=${ADEMED_PASS}
    volumes:
      - ./agents/manager/skills:/app/skills:ro
    networks:
      - kairos-net
    shm_size: "2gb"

  # --- Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: kairos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - kairos-net
    depends_on:
      - evolution-go
      - openclaw
      - paperclip

volumes:
  evolution_data:
  openclaw_data:
  redis_data:
  postgres_data:
  minio_data:
  neo4j_data:
  chroma_data:

networks:
  kairos-net:
    driver: bridge
    name: kairos-net

# =============================================================
# Kairós Intelligence v2.7 — Nginx Reverse Proxy
# =============================================================

events {
    worker_connections 1024;
}

http {
    upstream evolution {
        server evolution-go:8080;
    }

    upstream openclaw {
        server openclaw:18789;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    server {
        listen 80;
        server_name _;

        # Health check
        location /health {
            return 200 '{"status":"ok","version":"2.7.0"}';
            add_header Content-Type application/json;
        }

        # Evolution Go API
        location /evolution/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://evolution/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Evolution Go Webhook (de entrada da Meta)
        location /webhook/ {
            proxy_pass http://evolution/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # OpenClaw Control Plane (acesso via Tailscale apenas)
        location /openclaw/ {
            # Acessível apenas via Tailscale (IP interno)
            # allow 100.0.0.0/8;
            # deny all;
            proxy_pass http://openclaw/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Bloquear acesso direto à raiz
        location / {
            return 404;
        }
    }
}
